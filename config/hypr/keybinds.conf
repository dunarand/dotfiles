$mod = SUPER
$disp = hyprctl dispatch
$ipc = qs -c noctalia-shell ipc call

$borders =  hyprctl keyword general:col.active_border "rgba(cba6f7ee) rgba(b4befeaa) 45deg"; \
            hyprctl keyword group:col.border_active = "rgba(a6e3a1ee) rgba(94e2d5aa) 45deg"; \
            hyprctl keyword group:col.border_locked_active = "rgba(eba0acee) rgba(f38ba8aa) 45deg"; \
            hyprctl keyword group:groupbar:col.active = "rgba(a6e3a1ee)"; \
            hyprctl keyword group:groupbar:col.locked_active = "rgba(eba0acee)"; \

# Session and General Commands
binddl = $mod SHIFT, ESCAPE, Toggle Power Menu, exec, $ipc sessionMenu toggle
bindd = $mod CTRL, BACKSPACE, Lock Screen, exec, $ipc lockScreen lock
bindd = CTRL SHIFT, DELETE, Shutdown Hyprland, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || $disp exit
bindd = CTRL SHIFT, F5, Restart/Refresh Noctalia Shell, exec, killall qs && qs -c noctalia-shell
binddl = $mod ALT SHIFT, K, Switch Keyboard Layout, exec, ~/.config/hypr/scripts/keyboard-layout.sh
bindd = ALT, P, Focused Window Properties, exec, ~/.config/hypr/scripts/capture-windowrule.sh

binddl = $mod, F11, Toggle Screen On/Off, exec, $disp dpms toggle
binddl = $mod, F12, Sleep, forceidle, 900

bindd = $mod, TAB, Toggle Workspace View, exec, qs ipc -c overview call overview toggle

bindd = $mod SHIFT, D, Disable Keybinds Toggle, submap, disabled
submap = disabled
bind = , ESCAPE, submap, reset
bind = CTRL, C, submap, reset
submap = reset

# Window actions
bindd = $mod SHIFT, F, Fullscreen Toggle, fullscreen
bindd = $mod, F, Maximize Window, fullscreen, 1
bindd = $mod, C, Center, centerwindow
bindd = $mod, R, Resize Window, exec, ~/.config/hypr/scripts/resize-toggle.sh
bindd = $mod, X, Close/Kill Focused Window, killactive
bindd = $mod SHIFT, X, Kill Process, forcekillactive
bindd = $mod, P, Pin Window, pin, active
bindd = $mod, ESCAPE, Close/Unfocus Floating Window, exec, ~/.config/hypr/scripts/close-unfocus-floating.sh
bindd = $mod CTRL, F, Toggle Float, exec, ~/.config/hypr/scripts/toggle-float-center.sh

# Program Binds
bindd = $mod, T, Terminal, exec, $terminal
bindd = $mod, E, File Manager, exec, $fileManager
bindd = $mod, B, Browser, exec, $browser

bindd = $mod ALT, SPACE, Enter App Launcher Mode, submap, apps
submap = apps
bind = , T, exec, $terminal
bind = , E, exec, $fileManager
bind = , B, exec, $browser
bind = , N, exec, $terminal -e nvim
bind = , C, exec, $calculator
bind = , V, exec, $videoPlayer
bind = , M, exec, $musicPlayer
bind = , I, exec, $imageViewer
bind = , R, exec, $resourceMon
bind = , ESCAPE, submap, reset
bind = CTRL, C, submap, reset
submap = reset

bindd = $mod CTRL SHIFT, C, Hyprland config, exec, $terminal -e nvim ~/.config/hypr/hyprland.conf

bindd = $mod, GRAVE, Toggle btm System Monitor (Hold Key), togglespecialworkspace, btm
bindr = $mod, GRAVE, togglespecialworkspace, btm
bind = $mod GRAVE, mouse:271, togglespecialworkspace, btm

# Launchers
bindd = $mod SHIFT, SPACE, Web Search, exec, ~/.config/hypr/scripts/brave-search.sh
bindd = $mod, F1, File Search, exec, $disp exec "[float; size 960 600]" "$terminal -e fs.sh"

bindd = $mod, SPACE, Application Launcher, exec, $ipc launcher toggle
bindd = $mod SHIFT, TAB, Cycle Windows, exec, $ipc launcher windows
bindd = $mod, Q, Keybinds, exec, pkill rofi || ~/.config/hypr/scripts/keybinds.sh
bindd = $mod CTRL, SPACE, Layout Menu, exec, pkill rofi || ~/.config/hypr/scripts/layout-manager.sh
bindd = $mod, V, Clipboard History, exec, $ipc launcher clipboard

# Utilities / Scripts
bindd = $mod SHIFT, C, Color Picker, exec, hyprpicker
bindd = $mod, A, Cycle Audio Output Device, exec, ~/.config/hypr/scripts/cycle-sinks.sh
bindd = $mod SHIFT, A, Cycle Audio Profile, exec, ~/.config/easyeffects/scripts/preset-cycle.sh
bindd = $mod, W, Toggle Wallpaper Selector, exec, $ipc wallpaper toggle

bindd = $mod SHIFT, V, Toggle Clipboard History, exec, $ipc plugin:clipper toggle
bindd = $mod CTRL, D, Toggle Dashboard, exec, $ipc controlCenter toggle
bindd = $mod CTRL, S, Toggle Screen Utilities, exec, $ipc plugin:screen-toolkit toggle
bindd = $mod CTRL, A, Toggle Audio Control, exec, $ipc volume togglePanel
bindd = $mod CTRL, M, Toggle Music Control, exec, $ipc media toggle
bindd = $mod CTRL, B, Toggle Bluetooth Control, exec, $ipc bluetooth togglePanel
bindd = $mod CTRL, N, Toggle Network Control, exec, $ipc network togglePanel
bindd = $mod CTRL, P, Toggle Mimeapps GUI, exec, $ipc plugin:mimeapp-gui open

# bindd = $mod, W, Cycle Wallpaper, exec, ~/.config/hypr/scripts/wallpaper-switch.sh
# bindd = $mod SHIFT, W, Cycle Wallpaper Theme, exec, ~/.config/hypr/scripts/wallpaper-mood.sh
# bindd = $mod ALT, W, Toggle Auto Wallpaper Cycle, exec, ~/.config/hypr/scripts/wallpaper-auto.sh

# Screenshots & Recordings
bindd = $mod SHIFT, S, Area Screenshot, exec, ~/.config/hypr/scripts/screenshot-mode.sh
bindd = SHIFT, F9, Start/Stop OBS Recording, pass, class:^(com\.obsproject\.Studio)$
bindd = SHIFT, F10, Pause/Resume OBS Recording, pass, class:^(com\.obsproject\.Studio)$

# Moving focus
bindd = $mod, H, Focus Left Window, movefocus, l
bindd = $mod, L, Focus Right Window, movefocus, r
bindd = $mod, K, Focus Up Window, movefocus, u
bindd = $mod, J, Focus Down Window, movefocus, d

# Moving windows
bindd = $mod SHIFT, H, Move Window to Left, movewindow, l
bindd = $mod SHIFT, L, Move Window to Right, movewindow, r
bindd = $mod SHIFT, K, Move Window to Up, movewindow, u
bindd = $mod SHIFT, J, Move Window to Down, movewindow, d

# Workspaces
bindd = $mod, 1, Workspace 1, workspace, 1
bindd = $mod, 2, Workspace 2, workspace, 2
bindd = $mod, 3, Workspace 3, workspace, 3
bindd = $mod, 4, Workspace 4, workspace, 4
bindd = $mod, 5, Workspace 5, workspace, 5
bindd = $mod, 6, Workspace 6, workspace, 6
bindd = $mod, 7, Workspace 7, workspace, 7
bindd = $mod, 8, Workspace 8, workspace, 8
bindd = $mod, 9, Workspace 9, workspace, 9

bindd = $mod SHIFT, 1, Move Window to Workspace 1, movetoworkspace, 1
bindd = $mod SHIFT, 2, Move Window to Workspace 2, movetoworkspace, 2
bindd = $mod SHIFT, 3, Move Window to Workspace 3, movetoworkspace, 3
bindd = $mod SHIFT, 4, Move Window to Workspace 4, movetoworkspace, 4
bindd = $mod SHIFT, 5, Move Window to Workspace 5, movetoworkspace, 5
bindd = $mod SHIFT, 6, Move Window to Workspace 6, movetoworkspace, 6
bindd = $mod SHIFT, 7, Move Window to Workspace 7, movetoworkspace, 7
bindd = $mod SHIFT, 8, Move Window to Workspace 8, movetoworkspace, 8
bindd = $mod SHIFT, 9, Move Window to Workspace 9, movetoworkspace, 9

binddl = $mod ALT, RIGHT, Next Workspace, workspace, +1
binddl = $mod ALT, LEFT, Previous Workspace, workspace, -1
binddl = $mod CTRL, RIGHT, Move Window to the Next Workspace, movetoworkspace, +1
binddl = $mod CTRL, LEFT, Move Window to the Previous Workspace, movetoworkspace, -1


# GOATed Submap
bindd = $mod SHIFT, R, Enter Window Position/Size Modifier Mode, exec, \
    hyprctl keyword general:col.active_border "rgba(f9e2afee) rgba(fab387aa) 45deg"; \
    hyprctl keyword group:col.border_active = "rgba(f9e2afee) rgba(fab387aa) 45deg"; \
    hyprctl keyword group:col.border_locked_active = "rgba(f9e2afee) rgba(fab387aa) 45deg"; \
    hyprctl keyword group:groupbar:col.active = "rgba(f9e2afee)"; \
    hyprctl keyword group:groupbar:col.locked_active = "rgba(f9e2afee)"; \
    $disp submap resize
submap = resize
binde = , RIGHT, resizeactive, 10 0
binde = , LEFT, resizeactive, -10 0
binde = , UP, resizeactive, 0 10
binde = , DOWN, resizeactive, 0 -10
binde = SHIFT, RIGHT, moveactive, 10 0
binde = SHIFT, LEFT, moveactive, -10 0
binde = SHIFT, UP, moveactive, 0 -10
binde = SHIFT, DOWN, moveactive, 0 10
bind = , F, fullscreen, 1
bind = SHIFT, F, fullscreen
bind = CTRL, F, exec, ~/.config/hypr/scripts/toggle-float-center.sh
bind = , C, centerwindow
bind = , X, killactive
bind = SHIFT, X, forcekillactive
bind = , P, pin, active
bind = , R, exec, ~/.config/hypr/scripts/resize-toggle.sh
bind = CTRL, 1, resizeactive, exact 10% 10%
bind = CTRL, 2, resizeactive, exact 20% 20%
bind = CTRL, 3, resizeactive, exact 30% 30%
bind = CTRL, 4, resizeactive, exact 40% 40%
bind = CTRL, 5, resizeactive, exact 50% 50%
bind = CTRL, 6, resizeactive, exact 60% 60%
bind = CTRL, 7, resizeactive, exact 70% 70%
bind = CTRL, 8, resizeactive, exact 80% 80%
bind = CTRL, 9, resizeactive, exact 90% 90%
bind = , 1, workspace, 1
bind = , 2, workspace, 2
bind = , 3, workspace, 3
bind = , 4, workspace, 4
bind = , 5, workspace, 5
bind = , 6, workspace, 6
bind = , 7, workspace, 7
bind = , 8, workspace, 8
bind = , 9, workspace, 9
bind = SHIFT, 1, movetoworkspace, 1
bind = SHIFT, 2, movetoworkspace, 2
bind = SHIFT, 3, movetoworkspace, 3
bind = SHIFT, 4, movetoworkspace, 4
bind = SHIFT, 5, movetoworkspace, 5
bind = SHIFT, 6, movetoworkspace, 6
bind = SHIFT, 7, movetoworkspace, 7
bind = SHIFT, 8, movetoworkspace, 8
bind = SHIFT, 9, movetoworkspace, 9
bind = , H, movefocus, l
bind = , L, movefocus, r
bind = , K, movefocus, u
bind = , J, movefocus, d
bind = , TAB, cyclenext
bind = SHIFT, H, movewindow, l
bind = SHIFT, L, movewindow, r
bind = SHIFT, K, movewindow, u
bind = SHIFT, J, movewindow, d
bind = , ESCAPE, exec, $borders $disp submap reset
bind = CTRL, C, exec, $borders $disp submap reset
submap = reset

# Special Workspaces
bindd = $mod, M, Toggle Overlay Special, togglespecialworkspace, overlay
bindd = $mod ALT, M, Move from Overlay Workspace, movetoworkspace, +0
bindd = $mod SHIFT, M, Move to Overlay Workspace, movetoworkspace, special:overlay

bindd = $mod, Z, Toggle Minimized Workspace, togglespecialworkspace, minimized
bindd = $mod SHIFT, Z, Toggle Window Minimized State, exec, ~/.config/hypr/scripts/minimize.sh

bindd = $mod, S, Toggle Spotify, togglespecialworkspace, Spotify
bindd = $mod, O, Toggle OBS, togglespecialworkspace, OBS
bindd = $mod, D, Toggle Discord, togglespecialworkspace, Discord
bindd = $mod SHIFT, E, Toggle Easy Effects, togglespecialworkspace, EasyEffects

# Group Actions
bindd = $mod, G, Toggle Group, togglegroup
bindd = $mod SHIFT, G, Lock Active Group, lockactivegroup, toggle
bindd = $mod CTRL, G, Move Window Out of Group, moveoutofgroup
bindd = $mod ALT, G, Toggle Window to Ignore Grouping, denywindowfromgroup, toggle

bindd = $mod CTRL, H, Move Window into Group, moveintogroup, left
bindd = $mod CTRL, J, Move Window into Group, moveintogroup, down
bindd = $mod CTRL, K, Move Window into Group, moveintogroup, up
bindd = $mod CTRL, L, Move Window into Group, moveintogroup, right

bindd = CTRL, TAB, Move Focus Back in Group, changegroupactive, b
bindd = ALT, TAB, Move Focus Forward in Group, changegroupactive, f
bindd = SHIFT CTRL, TAB, Move Window Back in Group, movegroupwindow, b
bindd = SHIFT ALT, TAB, Move Window Forward in Group, movegroupwindow, f

# Mouse interactions
binddm = $mod, mouse:272, Drag to Move Window (Hold), movewindow
binddm = $mod, mouse:273, Resize Window (Hold), resizewindow
binddm = $mod CTRL, mouse:273, Resize Window & Keep Aspect Ratio (Hold), resizewindow 1
bindd = $mod, mouse:274, Close/Kill Focused Window, killactive
bindd = $mod SHIFT, mouse:274, Toggle Window Minimized State, exec, ~/.config/hypr/scripts/minimize.sh

bindl = , mouse:btn_side, exec, $disp keybind BACK
bindl = , mouse:btn_extra, exec, $disp keybind FORWARD

bindd = $mod, mouse_up, Next Workspace, workspace, -1
bindd = $mod, mouse_down, Previous Workspace, workspace, +1

bindd = $mod ALT, mouse:272, Minimize Window, exec, ~/.config/hypr/scripts/minimize.sh
bindd = $mod ALT, mouse:273, Fullscreen Toggle, fullscreen, 1
bindd = $mod ALT, mouse:274, Close/Kill Focused Window, killactive

# Keyboard Special/Extra Keys
bindl = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/vol-up.sh
bindl = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/vol-down.sh
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = $mod, XF86AudioMute, exec, playerctl play-pause
bindl = $mod, XF86AudioRaiseVolume, exec, playerctl next
bindl = $mod, XF86AudioLowerVolume, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bind = ALT, RIGHT, sendshortcut, , END,
bind = ALT, LEFT, sendshortcut, , HOME,
bind = ALT, UP, sendshortcut, , PAGE_UP,
bind = ALT, DOWN, sendshortcut, , PAGE_DOWN,
