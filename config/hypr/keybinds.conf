$mainMod = SUPER
$ipc = qs -c noctalia-shell ipc call

# Power / Session / General Commands
bindl = $mainMod SHIFT, ESCAPE, exec, $ipc sessionMenu toggle # Power Menu
bind = $mainMod CTRL, L, exec, $ipc lockScreen lock # Lock Screen
bind = $mainMod SHIFT, DELETE, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit # Shutdown Hyprland
bind = $mainMod, F12, exec, hyprctl reload && notify-send "Hyprland" "Configuration reloaded" # Reload Hyprland
bindl = ALT, K, exec, ~/.config/hypr/scripts/keyboard-layout.sh # Switch Keyboard Layout
bind = ALT, P, exec, ~/.config/hypr/scripts/capture-windowrule.sh # Hyprctl Window Properties

bind = ALT, Q, exec, $ipc volume decrease

# Window actions
bind = $mainMod, F, fullscreen # Fullscreen
bind = $mainMod, C, centerwindow # Center
bind = $mainMod, X, killactive # Close
bind = $mainMod SHIFT, X, forcekillactive # Kill Process
bind = $mainMod, ESCAPE, exec, pkill rofi || ~/.config/hypr/scripts/close-floating.sh # Close Floating Window (On-Focus) & Rofi
bind = $mainMod SHIFT, F, exec, ~/.config/hypr/scripts/toggle-float-center.sh # Toggle Float

# Program Binds
bind = $mainMod, T, exec, $terminal # Terminal
bind = $mainMod, E, exec, $fileManager # File Manager
bind = $mainMod, B, exec, $browser # Browser
bind = $mainMod ALT, N, exec, $terminal -e nvim # Neovim
bind = $mainMod ALT, C, exec, $calculator # Calculator
bind = $mainMod ALT, V, exec, $videoPlayer # Video Player
bind = $mainMod ALT, M, exec, $musicPlayer # Music Player
bind = $mainMod ALT, I, exec, $imageViewer # Image Viewer
bind = $mainMod ALT, R, exec, $resourceMon # Resource Monitor

bind = $mainMod CTRL SHIFT, C, exec, $terminal -e nvim ~/.config/hypr/hyprland.conf # Hyprland config

# Launchers
bind = $mainMod ALT, SPACE, exec, ~/.config/hypr/scripts/brave-search.sh # Web Search
bind = $mainMod, F1, exec, hyprctl dispatch exec "[float; size 900 600]" "$terminal -e fs.sh" # File Search

bind = $mainMod, SPACE, exec, $ipc launcher toggle # Application Launcher
bind = $mainMod SHIFT, R, exec, pkill rofi || rofi -show run # Command Runner
bind = $mainMod, TAB, exec, $ipc launcher windows # Cycle Windows
bind = $mainMod, Q, exec, pkill rofi || ~/.config/hypr/scripts/keybinds.sh # Keybinds
bind = $mainMod CTRL, SPACE, exec, pkill rofi || ~/.config/hypr/scripts/layout-manager.sh # Layout Menu
bind = $mainMod, V, exec, $ipc launcher clipboard # Clipboard History
bind = ALT, F, exec, $ipc plugin:file-search toggle # Search Files

# Utilities / Scripts
bind = $mainMod, R, exec, ~/.config/hypr/scripts/resize-toggle.sh # Resize Window
bind = $mainMod SHIFT, C, exec, hyprpicker # Color Picker
bind = $mainMod SHIFT, A, exec, ~/.config/easyeffects/scripts/preset-cycle.sh # Cycle Audio Profile
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper-switch.sh # Cycle Wallpaper
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper-mood.sh # Cycle Wallpaper Theme
bind = $mainMod ALT, W, exec, ~/.config/hypr/scripts/wallpaper-auto.sh # Toggle Auto Wallpaper Cycle

# Screenshots
bind = ALT, S, exec, ~/.config/hypr/scripts/screenshot-mode.sh # Area Screenshot
bind = CTRL ALT, S, exec, sh -c 'last=$(ls -t "$HOME"/Pictures/Screenshots/*.png 2>/dev/null | head -n1); [ -n "$last" ] && hyprctl dispatch exec "loupe \"$last\""' # Open Last Screenshot

# Moving focus
bind = $mainMod, H, movefocus, l # Focus Left Window
bind = $mainMod, L, movefocus, r # Focus Right Window
bind = $mainMod, K, movefocus, u # Focus Up Window
bind = $mainMod, J, movefocus, d # Focus Down Window
bind = ALT, TAB, cyclenext # Cycle Focus

# Moving windows
bind = $mainMod SHIFT, H, movewindow, l # Move Window to Left
bind = $mainMod SHIFT, L, movewindow, r # Move Window to Right
bind = $mainMod SHIFT, K, movewindow, u # Move Window to Up
bind = $mainMod SHIFT, J, movewindow, d # Move Window to Down

# Workspaces
bind = $mainMod, 1, workspace, 1 # Workspace 1
bind = $mainMod, 2, workspace, 2 # Workspace 2
bind = $mainMod, 3, workspace, 3 # Workspace 3
bind = $mainMod, 4, workspace, 4 # Workspace 4
bind = $mainMod, 5, workspace, 5 # Workspace 5
bind = $mainMod, 6, workspace, 6 # Workspace 6
bind = $mainMod, 7, workspace, 7 # Workspace 7
bind = $mainMod, 8, workspace, 8 # Workspace 8
bind = $mainMod, 9, workspace, 9 # Workspace 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1 # Move Window to Workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2 # Move Window to Workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3 # Move Window to Workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4 # Move Window to Workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5 # Move Window to Workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 # Move Window to Workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7 # Move Window to Workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8 # Move Window to Workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9 # Move Window to Workspace 9

bind = $mainMod ALT, right, workspace, +1 # Next Workspace
bind = $mainMod ALT, left, workspace, -1 # Previous Workspace
bind = $mainMod CTRL, right, movetoworkspace, +1 # Move Window to the Next Workspace
bind = $mainMod CTRL, left, movetoworkspace, -1 # Move Window to the Previous Workspace

# Special Workspaces
bind = $mainMod, Z, togglespecialworkspace, minimized # Toggle Minimized Special Workspace
bind = $mainMod ALT, Z, movetoworkspace, +0 # Move from Minimized Special Workspace
bind = $mainMod SHIFT, Z, movetoworkspace, special:minimized # Move to Minimized Special Workspace

bind = $mainMod, S, togglespecialworkspace, Spotify # Toggle Spotify
bind = $mainMod, O, togglespecialworkspace, OBS # Toggle OBS
bind = $mainMod, D, togglespecialworkspace, Discord # Toggle Discord

# Mouse interactions
bindm = $mainMod, mouse:272, movewindow # ignore
bindm = $mainMod, mouse:273, resizewindow # ignore
bind = $mainMod, mouse:274, killactive # ignore

# Keyboard/Mouse Special/Extra Keys
bindl = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/vol-up.sh # ignore
bindl = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/vol-down.sh # ignore
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # ignore
bindl = , XF86AudioPlay, exec, playerctl play-pause # ignore
bindl = $mainMod, XF86AudioMute, exec, playerctl play-pause # ignore
bindl = $mainMod, XF86AudioRaiseVolume, exec, playerctl next # ignore
bindl = $mainMod, XF86AudioLowerVolume, exec, playerctl previous # ignore
bindl = , XF86AudioNext, exec, playerctl next # ignore
bindl = , XF86AudioPrev, exec, playerctl previous # ignore
bindl = , mouse:BTN_SIDE, exec, hyprctl dispatch keybind BACK # ignore
bindl = , mouse:BTN_EXTRA, exec, hyprctl dispatch keybind FORWARD # ignore

bind = ALT, right, sendshortcut, , END, # ignore
bind = ALT, left, sendshortcut, , HOME, # ignore
bind = ALT, up, sendshortcut, , PAGE_UP, # ignore
bind = ALT, down, sendshortcut, , PAGE_DOWN, # ignore
