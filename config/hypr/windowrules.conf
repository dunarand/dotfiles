#####################
### GENERAL RULES ###
#####################

windowrule {
    name = file-dialogs
    match:title = (?i)(open|select|choose|save|pick)\s*(file|files|folder|as|document|doc|item)
    float = true
    center = true
    size = 720 720
}

windowrule {
    name = properties-dialogs
    match:title = (?i)(properties)
    float = true
    center = true
}

#######################
### APP BASED RULES ###
#######################

windowrule {
    name = spotify
    match:class = spotify
    workspace = 9
}

windowrule {
    name = localsend
    match:class = localsend
    float = true
    size = 960 600
    center = true
}

windowrule {
    name = ark
    match:class = org.kde.ark
    float = true
    size = 960 600
    center = true
}

windowrule {
    name = nm-connection
    match:class = nm-connection-editor
    float = true
    center = true
}

windowrule {
    name = dolphin-main-window
    match:class = org.kde.dolphin
    match:title = Choose Application — Dolphin
    float = true
    center = true
}

windowrule {
    name = jetbrains
    match:class = ^(jetbrains-.*)$
    no_initial_focus = true
}

######################
### NAUTILUS RULES ###
######################

windowrule {
    name = nautilus-popup
    match:class = org.gnome.Nautilus
    float = true
    center = true
}

windowrule {
    name = nautilus-main-window
    match:class = org.gnome.Nautilus
    match:initial_title = Loading…
    float = false
}

