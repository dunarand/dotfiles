#####################
### GENERAL RULES ###
#####################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = global-rounding
    match:class = .*
    rounding = 12
}

windowrule {
    name = file-dialogs
    match:title = (?i)(open|select|choose|save|pick)\s*(file|files|folder|as|document|doc|item)
    float = true
    center = true
    size = 720 720
}

windowrule {
    name = properties-dialogs
    match:title = (?i)(properties)
    float = true
    center = true
}

#######################
### APP BASED RULES ###
#######################

