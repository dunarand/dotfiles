#####################
### DISCORD RULES ###
#####################

windowrule {
    name = discord-ws
    match:class = discord
    workspace = 3
}

windowrule {
    name = discord-ui-popup
    match:class = Discord
    float = true
    center = true
}

windowrule {
    name = discord-main-window
    match:class = Discord
    match:title = .*Discord.*
    float = false
}

####################
### CHROME RULES ###
####################

windowrule {
    name = chrome-sign-in-popup
    match:class = google-chrome
    match:initial_title = Untitled.*
    float = true
    center = true
}

windowrule {
    name = chrome-main-window
    match:class = google-chrome
    match:initial_title = New Tab.*
    float = false
}

windowrule {
    name = youtube-music
    match:title = YouTube Music
    workspace = 9
}

######################
### STEAM UI RULES ###
######################

windowrule {
    name = steam-ws
    match:class = steam
    match:title = Steam
    workspace = 4
}

windowrule {
    name = steam-ui-popup
    match:class = steam|Steam
    float = true
    center = true
}

windowrule {
    name = steam-menus
    match:class = steam
    match:title = ^$
    center = false
}

windowrule {
    name = steam-window
    match:class = steam
    match:title = Steam
    float = false
}

windowrule {
    name = steam-friends-list
    match:class = steam
    match:title = Friends List
    float = true
    center = true
    size = 280 640
}

