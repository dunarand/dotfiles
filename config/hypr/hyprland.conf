#######################
### HYPRLAND CONFIG ###
#######################


################
### MONITORS ###
################

monitor = DP-1, 2560x1440@180.00Hz, 2560x0, 1, cm, srgb


########################
### DEFAULT PROGRAMS ###
########################

source = ~/.config/hypr/default-programs.conf


#################
### AUTOSTART ###
#################

source = ~/.config/hypr/autostart.conf

#############################
### ENVIRONMENT VARIABLES ###
#############################

source = ~/.config/hypr/env-vars.conf


###################
### PERMISSIONS ###
###################


###############
### PLUGINS ###
###############

# source = ~/.config/hypr/plugins.conf


#####################
### LOOK AND FEEL ###
#####################

general {
    border_size = 2
    gaps_in = 4
    gaps_out = 8
    resize_on_border = true
    allow_tearing = false
    layout = dwindle

    col.active_border = rgba(cba6f7ee) rgba(b4befeaa) 45deg
    col.inactive_border = rgba(585b70aa)

    snap {
        enabled = true
    }
}

decoration {
    rounding = 12
    rounding_power = 2
    active_opacity = 1.
    inactive_opacity = 0.9

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.20
        special = false
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,    default
    animation = border,        1, 5.39,  easeOutQuint
    animation = windows,       1, 4.79,  easeOutQuint
    animation = windowsIn,     1, 4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49,  linear,       popin 87%
    animation = fadeIn,        1, 1.73,  almostLinear
    animation = fadeOut,       1, 1.46,  almostLinear
    animation = fade,          1, 3.03,  quick
    animation = layers,        1, 3.81,  easeOutQuint
    animation = layersIn,      1, 4,     easeOutQuint, fade
    animation = layersOut,     1, 1.5,   linear,       fade
    animation = fadeLayersIn,  1, 1.79,  almostLinear
    animation = fadeLayersOut, 1, 1.39,  almostLinear
    animation = workspaces,    1, 1.94,  almostLinear, fade
    animation = workspacesIn,  1, 1.21,  almostLinear, fade
    animation = workspacesOut, 1, 1.94,  almostLinear, fade
    animation = zoomFactor,    1, 7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_mouse_windowdragging = true
    focus_on_activate = true
    middle_click_paste = false
}


#############
### INPUT ###
#############

input {
    kb_layout      = us,tr
    repeat_rate    = 32
    repeat_delay   = 500
    sensitivity    = 0.5
    accel_profile  = flat
    force_no_accel = true
    follow_mouse   = 1
    # kb_options = caps:swapescape # Try this one out later
}


###########################
### KEYBINDINGS & BINDS ###
###########################

source = ~/.config/hypr/keybinds.conf

binds {
    hide_special_on_workspace_change = true
    workspace_center_on = 1
    movefocus_cycles_fullscreen = true
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

source = ~/.config/hypr/windowrules.conf

workspace = special:minimized, layout:scrolling


##############
### GROUPS ###
##############

group {
    col.border_active = rgba(a6e3a1ee) rgba(94e2d5aa) 45deg
    col.border_inactive = rgba(45475aff)
    col.border_locked_active = rgba(eba0acee) rgba(f38ba8aa) 45deg
    col.border_locked_inactive = rgba(45475aff)

    groupbar {
        render_titles = false
        indicator_height = 3
        rounding = 4
        rounding_power = 1
        col.active = rgba(a6e3a1ee)
        col.inactive = rgba(45475aff)
        col.locked_active = rgba(eba0acee)
        col.locked_inactive = rgba(45475aff)
        keep_upper_gap = false
        blur = true
    }
}
